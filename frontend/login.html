<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NimbusDrive — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --text2: #8888aa;
      --accent: #6ee7f7;
      --accent2: #a78bfa;
      --danger: #f87171;
      --success: #4ade80;
      --radius: 16px;
    }
    [data-theme="light"] {
      --bg: #e3e1d6; --bg2: #eceae0; --bg3: #d8d6cb;
      --glass: rgba(255,252,245,0.6); --glass-border: rgba(180,175,160,0.3);
      --text: #2c2b28; --text2: #6b6a62;
      --accent: #0eb5c7; --accent2: #8b6fd4;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.12;
      animation: drift 12s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }
    .orb1 { width: 500px; height: 500px; background: #6ee7f7; top: -150px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: #a78bfa; bottom: -150px; right: -150px; animation-delay: -5s; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px,-30px) scale(1.05); }
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      background: var(--bg2);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
      margin-bottom: 2rem; justify-content: center;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem; font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card-sub { color: var(--text2); font-size: 0.86rem; margin-bottom: 1.8rem; }

    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .input-label { font-size: 0.78rem; color: var(--text2); font-weight: 500; }
    .input-field {
      background: var(--bg3);
      border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 11px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
      outline: none; width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(110,231,247,0.08);
    }
    .input-field::placeholder { color: var(--text2); }
    [data-theme="light"] .input-field { background: #f0ede4; }

    .btn-submit {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      color: #0a0a0f; cursor: pointer; margin-top: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-submit:hover { transform: scale(1.02); box-shadow: 0 6px 24px rgba(110,231,247,0.25); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1.4rem 0; color: var(--text2); font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--glass-border);
    }

    .switch-link {
      text-align: center; font-size: 0.84rem; color: var(--text2);
    }
    .switch-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .switch-link a:hover { text-decoration: underline; }

    .error-msg {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.83rem; color: var(--danger);
      margin-bottom: 1rem; display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.83rem; color: var(--success);
      margin-bottom: 1rem; display: none;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <path d="M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2z" fill="url(#lg1)"/>
        <path d="M8 14l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="lg1" x1="2" y1="2" x2="26" y2="26">
            <stop offset="0%" stop-color="#6ee7f7"/>
            <stop offset="100%" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
      NimbusDrive
    </div>

    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your files</div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="input-group">
      <label class="input-label">Email</label>
      <input class="input-field" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="input-group">
      <label class="input-label">Password</label>
      <input class="input-field" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Sign In</button>

    <div class="divider">or</div>

    <div class="switch-link">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    // If already logged in, redirect
    if (localStorage.getItem('nimbus_token')) {
      window.location.href = 'index.html';
    }

    // Apply saved theme
    const theme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('errorMsg').classList.remove('show');
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');

      if (!email || !password) { showError('Please fill in all fields'); return; }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('nimbus_token',    data.token);
          localStorage.setItem('nimbus_username', data.username);
          localStorage.setItem('nimbus_email',    data.email);
          showSuccess('Login successful! Redirecting...');
          setTimeout(() => window.location.href = 'index.html', 800);
        } else {
          showError(data.error || 'Login failed');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (e) {
        showError('Could not connect to server');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
