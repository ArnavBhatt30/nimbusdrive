<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NimbusDrive — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

    .cursor-dot {
      position: fixed; top: 0; left: 0; width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%; pointer-events: none;
      transform: translate(-50%, -50%); z-index: 99999; opacity: 0;
      transition: transform 0.1s, background 0.2s;
    }
    .cursor-ring {
      position: fixed; top: 0; left: 0; width: 32px; height: 32px;
      border: 1.5px solid var(--accent); border-radius: 50%; pointer-events: none;
      transform: translate(-50%, -50%); z-index: 99998; opacity: 0;
      transition: border-color 0.2s;
    }
    .cursor-dot.clicking { transform: translate(-50%, -50%) scale(0.6); }
    .cursor-ring.clicking { transform: translate(-50%, -50%) scale(0.8); }

    .btn-google {
      width: 100%; padding: 11px;
      background: var(--bg3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
      color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .btn-google:hover { border-color: var(--accent); background: var(--glass); transform: scale(1.01); }
    .btn-google svg { flex-shrink: 0; }

    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24;
      --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08);
      --text: #f0f0f5; --text2: #8888aa;
      --accent: #6ee7f7; --accent2: #a78bfa;
      --danger: #f87171; --success: #4ade80;
    }
    [data-theme="light"] {
      --bg: #e3e1d6; --bg2: #eceae0; --bg3: #d8d6cb;
      --glass: rgba(255,252,245,0.6); --glass-border: rgba(180,175,160,0.3);
      --text: #2c2b28; --text2: #6b6a62;
      --accent: #0eb5c7; --accent2: #8b6fd4;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.12;
      animation: drift 12s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }
    .orb1 { width: 500px; height: 500px; background: #a78bfa; top: -150px; right: -150px; }
    .orb2 { width: 400px; height: 400px; background: #6ee7f7; bottom: -150px; left: -150px; animation-delay: -5s; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px,-30px) scale(1.05); }
    }

    .card {
      position: relative; z-index: 1;
      background: var(--bg2);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem 2.8rem;
      width: 100%; max-width: 420px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
      margin-bottom: 2rem; justify-content: center;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card-sub { color: var(--text2); font-size: 0.86rem; margin-bottom: 1.8rem; }

    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .input-label { font-size: 0.78rem; color: var(--text2); font-weight: 500; }
    .input-field {
      background: var(--bg3);
      border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 11px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
      outline: none; width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,231,247,0.08); }
    .input-field::placeholder { color: var(--text2); }
    [data-theme="light"] .input-field { background: #f0ede4; }

    .input-hint { font-size: 0.72rem; color: var(--text2); margin-top: 3px; }

    .btn-submit {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      color: #0a0a0f; cursor: pointer; margin-top: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-submit:hover { transform: scale(1.02); box-shadow: 0 6px 24px rgba(110,231,247,0.25); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1.4rem 0; color: var(--text2); font-size: 0.78rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

    .switch-link { text-align: center; font-size: 0.84rem; color: var(--text2); }
    .switch-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .switch-link a:hover { text-decoration: underline; }

    .error-msg {
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.83rem; color: var(--danger); margin-bottom: 1rem; display: none;
    }
    .error-msg.show { display: block; }
    .success-msg {
      background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.83rem; color: var(--success); margin-bottom: 1rem; display: none;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <path d="M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2z" fill="url(#lg2)"/>
        <path d="M8 14l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="lg2" x1="2" y1="2" x2="26" y2="26">
            <stop offset="0%" stop-color="#6ee7f7"/>
            <stop offset="100%" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
      NimbusDrive
    </div>

    <div class="card-title">Create account</div>
    <div class="card-sub">Start storing your files in the cloud</div>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="input-group">
      <label class="input-label">Username</label>
      <input class="input-field" type="text" id="username" placeholder="cooluser123" autocomplete="username"/>
      <span class="input-hint">At least 3 characters</span>
    </div>

    <div class="input-group">
      <label class="input-label">Email</label>
      <input class="input-field" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="input-group">
      <label class="input-label">Password</label>
      <input class="input-field" type="password" id="password" placeholder="••••••••" autocomplete="new-password"/>
      <span class="input-hint">At least 6 characters</span>
    </div>

    <button class="btn-submit" id="signupBtn" onclick="handleSignup()">Create Account</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <div class="switch-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8000';

    // If already logged in, redirect
    if (localStorage.getItem('nimbus_token')) {
      window.location.href = 'index.html';
    }

    const theme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('errorMsg').classList.remove('show');
    }

    async function handleSignup() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('signupBtn');

      if (!username || !email || !password) { showError('Please fill in all fields'); return; }
      if (username.length < 3)  { showError('Username must be at least 3 characters'); return; }
      if (password.length < 6)  { showError('Password must be at least 6 characters'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res  = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('nimbus_token',    data.token);
          localStorage.setItem('nimbus_username', data.username);
          localStorage.setItem('nimbus_email',    data.email);
          showSuccess('Account created! Redirecting...');
          setTimeout(() => window.location.href = 'index.html', 800);
        } else {
          showError(data.error || 'Registration failed');
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      } catch (e) {
        showError('Could not connect to server');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    function handleGoogleLogin() {
      window.location.href = `${API}/auth/google`;
    }

    // Handle OAuth callback token in URL
    const urlParams = new URLSearchParams(window.location.search);
    const oauthToken    = urlParams.get('token');
    const oauthUsername = urlParams.get('username');
    const oauthEmail    = urlParams.get('email');
    const oauthError    = urlParams.get('error');

    if (oauthError) {
      showError(decodeURIComponent(oauthError));
    } else if (oauthToken) {
      localStorage.setItem('nimbus_token',    oauthToken);
      localStorage.setItem('nimbus_username', oauthUsername || 'User');
      localStorage.setItem('nimbus_email',    oauthEmail    || '');
      showSuccess('Account created with Google! Redirecting...');
      setTimeout(() => window.location.href = 'index.html', 800);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignup();
    });
  </script>

  <script>
    (function() {
      const dot = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');
      if ('ontouchstart' in window || navigator.maxTouchPoints > 0) { dot.style.display='none'; ring.style.display='none'; return; }
      let mouseX=0, mouseY=0, ringX=0, ringY=0;
      dot.style.opacity='1'; ring.style.opacity='0.6';
      document.addEventListener('mousemove', e => {
        mouseX=e.clientX; mouseY=e.clientY;
        dot.style.left=mouseX+'px'; dot.style.top=mouseY+'px';
      });
      (function animateRing() {
        ringX += (mouseX-ringX)*0.12; ringY += (mouseY-ringY)*0.12;
        ring.style.left=ringX+'px'; ring.style.top=ringY+'px';
        requestAnimationFrame(animateRing);
      })();
      document.addEventListener('mousedown', () => { dot.classList.add('clicking'); ring.classList.add('clicking'); });
      document.addEventListener('mouseup',   () => { dot.classList.remove('clicking'); ring.classList.remove('clicking'); });
      document.addEventListener('mouseleave', () => { dot.style.opacity='0'; ring.style.opacity='0'; });
      document.addEventListener('mouseenter', () => { dot.style.opacity='1'; ring.style.opacity='0.6'; });
    })();
  </script>
</body>
</html>
