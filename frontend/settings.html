<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NimbusDrive — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="auth.js"></script>
  <style>
    * { box-sizing: border-box; }

    .content {
      flex: 1;
      padding: 2.5rem 2.8rem 4rem;
      overflow-y: auto;
      height: 100vh;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2.2rem;
    }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-header p { color: var(--text2); font-size: 0.84rem; margin-top: 4px; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 99px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text2); font-size: 0.81rem;
      text-decoration: none; white-space: nowrap;
      transition: color .18s, border-color .18s, transform .18s;
      font-family: 'DM Sans', sans-serif;
    }
    .back-btn:hover { color: var(--text); border-color: var(--accent); transform: translateX(-2px); }
    [data-theme="light"] .back-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }

    /* ── Two-column grid ── */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      align-items: start;
    }
    @media (max-width: 920px) { .settings-grid { grid-template-columns: 1fr; } }

    .settings-col {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .settings-col:first-child {
      border-right: 1px solid rgba(255,255,255,0.07);
      padding-right: 2rem;
    }
    .settings-col:last-child {
      padding-left: 2rem;
    }
    [data-theme="light"] .settings-col:first-child { border-right-color: rgba(0,0,0,0.08); }

    /* ── Section blocks (no card boxes — use dividers instead) ── */
    .s-section {
      padding: 1.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .s-section:last-child { border-bottom: none; }
    [data-theme="light"] .s-section { border-bottom-color: rgba(0,0,0,0.07); }

    .s-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.1rem;
    }
    .s-section-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: rgba(110,231,247,0.1);
      border: 1px solid rgba(110,231,247,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    [data-theme="light"] .s-section-icon { background: rgba(14,181,199,0.1); border-color: rgba(14,181,199,0.18); }
    .s-section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text2);
      flex: 1;
    }
    .s-badge {
      font-size: 0.64rem; padding: 2px 7px; border-radius: 99px;
      background: rgba(110,231,247,0.1); color: var(--accent); font-weight: 600;
      border: 1px solid rgba(110,231,247,0.15);
    }

    /* ── Setting row ── */
    .s-row {
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.7rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .s-row:last-child { border-bottom: none; }
    [data-theme="light"] .s-row { border-bottom-color: rgba(0,0,0,0.05); }
    .s-row-info { flex: 1; min-width: 0; }
    .s-row-label { font-size: 0.875rem; font-weight: 500; color: var(--text); }
    .s-row-desc { font-size: 0.73rem; color: var(--text2); margin-top: 1px; }
    .s-row-control { flex-shrink: 0; }

    /* ── Profile strip ── */
    .profile-strip {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    [data-theme="light"] .profile-strip { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; font-weight: 700; font-family: 'Syne', sans-serif;
      color: #0a0a0f; flex-shrink: 0;
    }
    .profile-name { font-size: 0.88rem; font-weight: 600; }
    .profile-email { font-size: 0.74rem; color: var(--text2); margin-top: 1px; }
    .profile-plan {
      display: inline-block; margin-top: 3px;
      font-size: 0.65rem; padding: 2px 7px; border-radius: 99px;
      background: rgba(110,231,247,0.1); color: var(--accent); font-weight: 600;
    }

    /* ── Inputs ── */
    .s-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
    .s-input-group { display: flex; flex-direction: column; gap: 4px; }
    .s-input-label { font-size: 0.72rem; color: var(--text2); font-weight: 500; }
    .s-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px; padding: 8px 11px;
      font-family: 'DM Sans', sans-serif; font-size: 0.86rem; color: var(--text);
      outline: none; width: 100%;
    }
    .s-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,231,247,0.07); }
    .s-input::placeholder { color: var(--text2); }
    [data-theme="light"] .s-input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #2c2b28; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 9px;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0a0f; border: none; font-weight: 600;
    }
    .btn-primary:hover { transform: scale(1.03); box-shadow: 0 4px 14px rgba(110,231,247,0.22); }
    .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); }
    .btn-secondary:hover { border-color: var(--accent); background: rgba(110,231,247,0.06); }
    .btn-danger {
      background: rgba(248,113,113,0.07); color: var(--danger);
      border-color: rgba(248,113,113,0.2); font-size: 0.78rem;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.15); }

    /* ── Color swatches ── */
    .color-swatches { display: flex; gap: 7px; align-items: center; }
    .swatch {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform .15s; position: relative;
    }
    .swatch:hover { transform: scale(1.22); }
    .swatch.active { border-color: white; box-shadow: 0 0 0 2px var(--accent); }
    .swatch.active::after {
      content: '✓'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.58rem; font-weight: 700;
    }

    /* ── Shortcuts ── */
    .shortcuts-wrap {
      display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
    }
    .shortcut-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 9px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px; font-size: 0.76rem; color: var(--text2);
    }
    [data-theme="light"] .shortcut-row { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.07); }
    .keys { display: flex; gap: 3px; }
    .key {
      background: rgba(110,231,247,0.08); border: 1px solid rgba(110,231,247,0.18);
      color: var(--accent); padding: 1px 5px; border-radius: 4px;
      font-size: 0.67rem; font-family: 'SF Mono', monospace;
    }
    [data-theme="light"] .key { background: rgba(14,181,199,0.08); border-color: rgba(14,181,199,0.2); color: #0a9dad; }

    /* ── Danger section ── */
    .s-section.danger .s-section-title { color: var(--danger); }
    .s-section.danger .s-section-icon { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.18); }

    /* ── About ── */
    .about-inner { text-align: center; padding: 0.5rem 0 0.2rem; }
    .about-logo { font-size: 1.8rem; display: block; margin-bottom: 0.3rem; }
    .about-title {
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .about-version { font-size: 0.73rem; color: var(--text2); margin: 3px 0 0.9rem; }
    .about-links { display: flex; gap: 7px; justify-content: center; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 99998; opacity: 0; visibility: hidden;
      transition: opacity .2s, visibility .2s;
    }
    .modal-overlay.show { opacity: 1; visibility: visible; }
    .modal {
      background: var(--bg2); border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius); padding: 1.6rem;
      max-width: 360px; width: 90%; transform: scale(0.93);
      transition: transform .2s;
    }
    .modal-overlay.show .modal { transform: scale(1); }
    [data-theme="light"] .modal { background: #eceae0; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.35rem; }
    .modal-desc { color: var(--text2); font-size: 0.84rem; margin-bottom: 1.1rem; line-height: 1.5; }
    .modal-actions { display: flex; gap: 7px; justify-content: flex-end; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 1.8rem; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--bg3); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px; padding: 9px 20px; font-size: 0.84rem;
      z-index: 99999; transition: transform .22s ease, opacity .22s ease;
      opacity: 0; pointer-events: none;
      white-space: nowrap; display: flex; align-items: center; gap: 6px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--danger);  color: var(--danger); }
    [data-theme="light"] .toast { background: #eceae0; }

    .loader {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin .75s linear infinite; margin: 5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Kill orb blur for perf ── */
    .bg-orbs { display: none; }

    @media (max-width: 640px) {
      .content { padding: 1.4rem; }
      .shortcuts-wrap { grid-template-columns: 1fr; }
      .settings-col:first-child { border-right: none; padding-right: 0; border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
      .settings-col:last-child { padding-left: 0; }
    }
  </style>
</head>
<body>
  <div class="theme-transition-overlay" id="themeOverlay"></div>

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">Confirm Action</div>
      <div class="modal-desc" id="modalDesc">Are you sure?</div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <path d="M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2z" fill="url(#lg3)"/>
          <path d="M8 14l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="lg3" x1="2" y1="2" x2="26" y2="26">
              <stop offset="0%" stop-color="#6ee7f7"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
        NimbusDrive
      </div>
      <nav class="nav-links">
        <a class="nav-link" href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a class="nav-link" href="index.html"><span class="nav-icon">📁</span> My Files</a>
        <a class="nav-link active" href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-row">
          <span class="theme-label" id="usernameDisplay">User</span>
          <button class="logout-btn" onclick="logout()">↩ Logout</button>
        </div>

        <div style="display:flex;gap:8px;padding:4px 6px;">
          <a href="https://github.com/ArnavBhatt30" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--text2);font-size:0.75rem;text-decoration:none;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)'">🐙 GitHub</a>
          <a href="https://www.linkedin.com/in/arnav-bhatt-0139b8172/" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--text2);font-size:0.75rem;text-decoration:none;" onmouseover="this.style.borderColor='var(--accent2)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)'">💼 LinkedIn</a>
        </div>
        <div class="theme-row">
          <span class="theme-label">Dark mode</span>
          <label class="toggle-switch">
            <input type="checkbox" id="sidebarThemeCheck" checked/>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </aside>

    <main class="content" id="mainContent">
      <div class="loader"></div>
    </main>
  </div>

  <script>
    // API defined in auth.js

    // ===== THEME =====
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('sidebarThemeCheck').checked = savedTheme === 'dark';

    function switchTheme(isDark) {
      const theme = isDark ? 'dark' : 'light';
      const ov = document.getElementById('themeOverlay');
      ov.style.background = isDark ? '#0a0a0f' : '#e3e1d6';
      ov.classList.add('active');
      setTimeout(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.querySelectorAll('#sidebarThemeCheck, #themeToggle').forEach(el => { if (el) el.checked = isDark; });
        requestAnimationFrame(() => ov.classList.remove('active'));
        showToast(isDark ? '🌙 Dark mode' : '☀️ Light mode', 'success');
      }, 250);
    }
    document.getElementById('sidebarThemeCheck').addEventListener('change', e => switchTheme(e.target.checked));

    // ===== TOAST =====
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 2800);
    }

    // ===== MODAL =====
    function confirmAction(msg, cb) {
      document.getElementById('modalDesc').textContent = msg;
      document.getElementById('modalConfirm').onclick = () => { closeModal(); cb(); };
      document.getElementById('modalOverlay').classList.add('show');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

    // ===== CURSOR — lazy RAF, only runs when mouse moves =====
    const dot  = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');

    // Apply cursor setting on load
    const _initSettings = JSON.parse(localStorage.getItem('nimbusDriveSettings') || '{}');
    const _cursorEnabled = _initSettings.customCursor !== false;
    if (!_cursorEnabled) {
      if (dot)  dot.style.display  = 'none';
      if (ring) ring.style.display = 'none';
      document.body.classList.remove('custom-cursor-active');
    }

    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      if (dot)  dot.style.display = 'none';
      if (ring) ring.style.display = 'none';
      document.body.style.cursor = 'auto';
    } else {
      let rx = 0, ry = 0, mx = 0, my = 0, rafId = null;
      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        dot.style.left = mx + 'px'; dot.style.top = my + 'px';
        if (!rafId) rafId = requestAnimationFrame(animRing);
      });
      function animRing() {
        rx += (mx - rx) * 0.15;
        ry += (my - ry) * 0.15;
        ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
        rafId = Math.hypot(mx - rx, my - ry) > 0.4 ? requestAnimationFrame(animRing) : null;
      }
      document.addEventListener('mousedown', () => { dot.classList.add('clicking'); ring.classList.add('clicking'); });
      document.addEventListener('mouseup',   () => { dot.classList.remove('clicking'); ring.classList.remove('clicking'); });
      document.addEventListener('mouseover', e => {
        const h = !!e.target.closest('a,button,label,input,.toggle-switch,.swatch');
        dot.classList.toggle('hovering', h); ring.classList.toggle('hovering', h);
      });
    }

    // ===== PAGE TRANSITIONS =====
    function initPageTransitions() {
      const ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;z-index:99997;background:linear-gradient(135deg,#6ee7f7,#a78bfa);transform:translateX(-100%);pointer-events:none;';
      document.body.appendChild(ov);
      document.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http')) return;
        link.addEventListener('click', e => {
          e.preventDefault();
          ov.style.transition = 'transform 0.38s cubic-bezier(0.77,0,0.175,1)';
          ov.style.transform = 'translateX(0)';
          setTimeout(() => window.location.href = href, 380);
        });
      });
      requestAnimationFrame(() => requestAnimationFrame(() => {
        ov.style.transition = 'transform 0.42s cubic-bezier(0.77,0,0.175,1)';
        ov.style.transform = 'translateX(100%)';
      }));
    }

    // ===== SETTINGS ACTIONS =====
    function saveSetting(key, value) {
      const s = JSON.parse(localStorage.getItem('nimbusDriveSettings') || '{}');
      s[key] = value;
      localStorage.setItem('nimbusDriveSettings', JSON.stringify(s));
      showToast('Saved', 'success');

      // Apply effects immediately
      if (key === 'customCursor') applyCursorSetting(value);
    }

    function applyCursorSetting(enabled) {
      const dot  = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');
      if (enabled) {
        document.body.classList.add('custom-cursor-active');
        if (dot)  { dot.style.display  = 'block'; dot.style.opacity  = '1'; }
        if (ring) { ring.style.display = 'block'; ring.style.opacity = '0.6'; }
      } else {
        document.body.classList.remove('custom-cursor-active');
        if (dot)  dot.style.display  = 'none';
        if (ring) ring.style.display = 'none';
      }
    }

    function saveProfile() {
      const name  = document.getElementById('profileName').value.trim()  || 'NimbusDrive User';
      const email = document.getElementById('profileEmail').value.trim() || 'user@nimbusdrive.app';
      const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      localStorage.setItem('nimbusDriveProfile', JSON.stringify({ name, email, initials }));
      document.getElementById('avInitials').textContent = initials;
      document.getElementById('dispName').textContent  = name;
      document.getElementById('dispEmail').textContent = email;
      showToast('Profile saved!', 'success');
    }

    function setAccent(el) {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');

      const color = el.dataset.accent;
      const accents = {
        cyan:   { accent: '#6ee7f7', accent2: '#a78bfa' },
        purple: { accent: '#a78bfa', accent2: '#6ee7f7' },
        pink:   { accent: '#f472b6', accent2: '#a78bfa' },
        green:  { accent: '#4ade80', accent2: '#6ee7f7' },
      };

      const chosen = accents[color] || accents.cyan;
      document.documentElement.style.setProperty('--accent',  chosen.accent);
      document.documentElement.style.setProperty('--accent2', chosen.accent2);

      // Save to localStorage
      const s = JSON.parse(localStorage.getItem('nimbusDriveSettings') || '{}');
      s.accentColor = color;
      localStorage.setItem('nimbusDriveSettings', JSON.stringify(s));

      showToast('Accent color updated', 'success');
    }

    function applyAccentColor() {
      const s = JSON.parse(localStorage.getItem('nimbusDriveSettings') || '{}');
      if (!s.accentColor) return;
      const accents = {
        cyan:   { accent: '#6ee7f7', accent2: '#a78bfa' },
        purple: { accent: '#a78bfa', accent2: '#6ee7f7' },
        pink:   { accent: '#f472b6', accent2: '#a78bfa' },
        green:  { accent: '#4ade80', accent2: '#6ee7f7' },
      };
      const chosen = accents[s.accentColor];
      if (chosen) {
        document.documentElement.style.setProperty('--accent',  chosen.accent);
        document.documentElement.style.setProperty('--accent2', chosen.accent2);
      }
    }

    function resetSettings() {
      localStorage.removeItem('nimbusDriveSettings');
      showToast('Settings reset to defaults', 'success');
      setTimeout(() => {
        renderSettings();
        applyCursorSetting(true); // default is enabled
      }, 500);
    }

    async function clearAllFiles() {
      try {
        const res = await authFetch(`${API}/files/clear-all`, { method: 'DELETE' });
        const data = await res.json();
        showToast(data.success ? 'All files deleted' : (data.error || 'Failed'), data.success ? 'success' : 'error');
      } catch { showToast('Could not reach server', 'error'); }
    }

    // ===== RENDER =====
    function renderSettings() {
      const s  = JSON.parse(localStorage.getItem('nimbusDriveSettings') || '{}');
      const p  = JSON.parse(localStorage.getItem('nimbusDriveProfile')  || '{}');
      const name     = p.name     || 'NimbusDrive User';
      const email    = p.email    || 'user@nimbusdrive.app';
      const initials = p.initials || 'ND';
      const isDark   = (localStorage.getItem('theme') || 'dark') === 'dark';

      const tog = (key, def = true) => `<label class="toggle-switch"><input type="checkbox" ${s[key] !== false && (s[key] !== undefined || def) ? 'checked' : ''} onchange="saveSetting('${key}',this.checked)"><span class="toggle-slider"></span></label>`;

            document.getElementById('mainContent').innerHTML = `
        <div class="page-header">
          <div>
            <h1>⚙️ Settings</h1>
            <p>Customize your NimbusDrive experience</p>
          </div>
          <a href="index.html" class="back-btn">← Back to Files</a>
        </div>

        <div class="settings-grid">
          <div class="settings-col">

            <!-- Profile -->
            <div class="s-section">
              <div class="s-section-header">
                <div class="s-section-icon">👤</div>
                <span class="s-section-title">Profile</span>
              </div>
              <div class="profile-strip">
                <div class="avatar" id="avInitials">${initials}</div>
                <div>
                  <div class="profile-name" id="dispName">${name}</div>
                  <div class="profile-email" id="dispEmail">${email}</div>
                  <span class="profile-plan">✦ Free Plan</span>
                </div>
              </div>
              <div class="s-inputs">
                <div class="s-input-group">
                  <label class="s-input-label">Display Name</label>
                  <input class="s-input" id="profileName" type="text" placeholder="Your name" value="${p.name || ''}">
                </div>
                <div class="s-input-group">
                  <label class="s-input-label">Email</label>
                  <input class="s-input" id="profileEmail" type="email" placeholder="you@example.com" value="${p.email || ''}">
                </div>
                <button class="btn btn-primary" onclick="saveProfile()">💾 Save Profile</button>
              </div>
            </div>

            <!-- Appearance -->
            <div class="s-section">
              <div class="s-section-header">
                <div class="s-section-icon">🎨</div>
                <span class="s-section-title">Appearance</span>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Theme</div><div class="s-row-desc">Switch between dark and light mode</div></div>
                <div class="s-row-control"><label class="toggle-switch"><input type="checkbox" id="themeToggle" ${isDark ? 'checked' : ''}><span class="toggle-slider"></span></label></div>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Accent Color</div><div class="s-row-desc">Choose your highlight color</div></div>
                <div class="s-row-control">
                  <div class="color-swatches">
                    <div class="swatch active" style="background:#6ee7f7" onclick="setAccent(this)"></div>
                    <div class="swatch" style="background:#a78bfa" onclick="setAccent(this)"></div>
                    <div class="swatch" style="background:#f472b6" onclick="setAccent(this)"></div>
                    <div class="swatch" style="background:#4ade80" onclick="setAccent(this)"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- About -->
            <div class="s-section">
              <div class="s-section-header">
                <div class="s-section-icon">☁️</div>
                <span class="s-section-title">About NimbusDrive</span>
              </div>
              <div class="about-inner">
                <span class="about-logo">☁️</span>
                <div class="about-title">NimbusDrive</div>
                <div class="about-version">v1.0.0 · FastAPI + Vanilla JS</div>
                <div class="about-links">
                  <a href="https://github.com/ArnavBhatt30" target="_blank" class="btn btn-secondary">🐙 GitHub</a>
                  <a href="https://www.linkedin.com/in/arnav-bhatt-0139b8172/" target="_blank" class="btn btn-secondary">💼 LinkedIn</a>
                </div>
              </div>
            </div>

          </div>
          <div class="settings-col">

            <!-- Behaviour -->
            <div class="s-section">
              <div class="s-section-header">
                <div class="s-section-icon">⚡</div>
                <span class="s-section-title">Behaviour</span>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Smooth Scrolling</div><div class="s-row-desc">Lenis-powered inertia scrolling</div></div>
                <div class="s-row-control">${tog('smoothScroll')}</div>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Custom Cursor</div><div class="s-row-desc">Animated cursor dot and ring</div></div>
                <div class="s-row-control">${tog('customCursor')}</div>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Sound Effects</div><div class="s-row-desc">Subtle audio feedback on actions</div></div>
                <div class="s-row-control">${tog('sound')}</div>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Particle Background</div><div class="s-row-desc">Floating particles in the background</div></div>
                <div class="s-row-control">${tog('particles')}</div>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Upload Confetti</div><div class="s-row-desc">Celebrate successful uploads</div></div>
                <div class="s-row-control">${tog('confetti')}</div>
              </div>
            </div>

            <!-- Keyboard Shortcuts -->
            <div class="s-section">
              <div class="s-section-header">
                <div class="s-section-icon">⌨️</div>
                <span class="s-section-title">Keyboard Shortcuts</span>
                <span class="s-badge">Global</span>
              </div>
              <div class="shortcuts-wrap">
                <div class="shortcut-row"><span>Upload file</span><div class="keys"><span class="key">Ctrl</span><span class="key">U</span></div></div>
                <div class="shortcut-row"><span>Refresh</span><div class="keys"><span class="key">Ctrl</span><span class="key">R</span></div></div>
                <div class="shortcut-row"><span>Focus search</span><div class="keys"><span class="key">Ctrl</span><span class="key">K</span></div></div>
                <div class="shortcut-row"><span>Toggle theme</span><div class="keys"><span class="key">Ctrl</span><span class="key">D</span></div></div>
                <div class="shortcut-row"><span>Close panels</span><div class="keys"><span class="key">Esc</span></div></div>
              </div>
            </div>

            <!-- Danger Zone -->
            <div class="s-section danger">
              <div class="s-section-header">
                <div class="s-section-icon">⚠️</div>
                <span class="s-section-title">Danger Zone</span>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Reset All Settings</div><div class="s-row-desc">Restore all preferences to defaults</div></div>
                <div class="s-row-control"><button class="btn btn-danger" onclick="confirmAction('Reset all settings to defaults?', resetSettings)">Reset</button></div>
              </div>
              <div class="s-row">
                <div class="s-row-info"><div class="s-row-label">Delete All Files</div><div class="s-row-desc">Permanently remove all uploaded files</div></div>
                <div class="s-row-control"><button class="btn btn-danger" onclick="confirmAction('Delete ALL files? This cannot be undone.', clearAllFiles)">Delete All</button></div>
              </div>
            </div>

          </div>
        </div>
      `;

      document.getElementById('themeToggle').addEventListener('change', e => switchTheme(e.target.checked));
    }

    // ===== INIT =====
    function init() {
      applyAccentColor();
      initPageTransitions();
      renderSettings();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
        e.preventDefault();
        const c = document.getElementById('sidebarThemeCheck');
        c.checked = !c.checked;
        switchTheme(c.checked);
      }
    });
  </script>
</body>
</html>
